keys:
  # Your personal age key — generate with: age-keygen -o ~/.age/key.txt
  # The public key is printed to stdout and starts with "age1..."
  - &personal_key age1gkzwat9nfnkju9xws7kjg7efmfzcycwc47vm808teptp5pz8z40qhnmrgu

  # Desktop SSH host key converted to age — run on desktop:
  #   might need sudo ssh-keygen -A to be ran first
  #   nix-shell -p ssh-to-age --run "ssh-to-age < /etc/ssh/ssh_host_ed25519_key.pub"
  - &desktop_host age10zdhgvh33l49jqxvwj5kzpk7tsxxl38qdxnf3h2jna4wq0gec9kq5cnjra

  # # Laptop SSH host key converted to age — run on laptop:
  # #   nix-shell -p ssh-to-age --run "ssh-to-age < /etc/ssh/ssh_host_ed25519_key.pub"
  - &laptop_host age1shk8khpyfv7l2p3rjdlrhlrysyxtynu4g8xsepwsx0up4n0v6ctsa2shvv

creation_rules:
  - path_regex: secrets/.*\.yaml$
    key_groups:
      - age:
          - *personal_key
          - *desktop_host
          - *laptop_host
